[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "smoke: end-to-end smoke tests requiring running stack",
    "integration: integration tests requiring external services",
]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["infra/", "*.tf", "*.md"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]
